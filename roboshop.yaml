- name: roboshop instance management
  hosts: local
  connection: local
  vars:
    instances: ["mongodb", "redis", "mysql", "rabbitmq"]
    image_id: ami-0220d79f3f480ecf5
    domain_name: devpreactice.online
  tasks:
    - name: create ec2 instances
      amazon.aws.ec2_instance:
        instance_type: t3.micro
        name: "roboshop-{{ item }}"
        image_id: "{{ image_id }}"
        security_groups:
          - "roboshop-{{ item }}"
          - roboshop-common
      loop: "{{ instances }}"
      register: ec2_output
    #- name: print ec2_output
    #  debug:
    #    msg: "{{ ec2_output }}"

    #- name: create route53 record
    #  debug:
    #    msg: "Instance Name {{ item.item }} PrivateIP: {{ item.instances[0].private_ip_address }}"
    #  loop: "{{ ec2_output.results }}"

    - name: create r53 records
      amazon.aws.route53:
        state: present
        zone: "{{ domain_name }}"
        record: "{{ item.item }}.{{ domain_name }}" #mongodb.devpreactice.online
        type: A
        ttl: 1
        value: "{{ item.instances[0].private_ip_address }}"
        overwrite: true
      loop: "{{ ec2_output.results }}"

    - name: create r53 records
      amazon.aws.route53:
        state: present
        zone: "{{ domain_name }}"
        record: "{{ domain_name }}"  #devpreactice.online
        type: A
        ttl: 1
        value: "{{ item.instances[0].public_ip_address }}"
        overwrite: true
      loop: "{{ ec2_output.results }}"
      when: item.item == "frontend"



