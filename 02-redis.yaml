- name: configuring redis server
  hosts: redis
  become: yes
  tasks:
    - name: Create roboshop log directory
      file:
      path: /var/log/roboshop
      state: directory
      owner: ec2-user
      group: ec2-user
      mode: '0755'
    - name: Create ansible log file
      file:
      path: /var/log/roboshop/ansible.log
      state: touch
      owner: ec2-user
      group: ec2-user
      mode: '0644'
    - name: enable redis 7
      command: dnf module enable redis:7 -y
    - name: install redis
      package:
        name: redis
        state: present
    - name: allow remote connections
      replace:
        path: /etc/redis/redis.conf
        regexp: "127.0.0.1"
        replace: "0.0.0.0" 
    - name: change protected mode
      lineinfile:
        path: /etc/redis/redis.conf
        regexp: "protected-mode"
        line: "protected-mode no"
    - name: start and enable redis
      service:
        name: redis
        state: started
        enable: yes 
      